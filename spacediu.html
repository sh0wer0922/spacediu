<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>벨키 자기소개</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Cinzel+Decorative:wght@400;700&display=swap');

:root {
–deep-purple: #1a0a2e;
–dark-purple: #2d0e4e;
–mid-purple: #6b21a8;
–vivid-purple: #9333ea;
–glow-purple: #c084fc;
–pale-lavender: #e9d5ff;
–near-black: #0d0618;
–accent-pink: #f472b6;
–dark-pink: #9d174d;
–gray-text: #c4b5d4;
–border-glow: rgba(147,51,234,0.4);
}

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: var(–near-black);
min-height: 100vh;
display: flex;
align-items: center;
justify-content: center;
font-family: ‘Noto Sans KR’, sans-serif;
overflow-x: hidden;
padding: 20px;
}

/* 배경 노이즈 + 별 효과 */
body::before {
content: ‘’;
position: fixed;
inset: 0;
background:
radial-gradient(ellipse at 20% 10%, rgba(88,28,135,0.25) 0%, transparent 50%),
radial-gradient(ellipse at 80% 90%, rgba(88,28,135,0.2) 0%, transparent 50%),
radial-gradient(ellipse at 50% 50%, rgba(45,14,78,0.3) 0%, transparent 70%);
pointer-events: none;
z-index: 0;
}

.stars {
position: fixed;
inset: 0;
pointer-events: none;
z-index: 0;
overflow: hidden;
}
.star {
position: absolute;
border-radius: 50%;
background: white;
animation: twinkle linear infinite;
}

@keyframes twinkle {
0%,100% { opacity: 0.1; transform: scale(1); }
50% { opacity: 0.6; transform: scale(1.3); }
}

.card {
position: relative;
z-index: 1;
width: 100%;
max-width: 440px;
background: linear-gradient(160deg, rgba(26,10,46,0.98) 0%, rgba(13,6,24,0.98) 100%);
border: 1px solid var(–border-glow);
border-radius: 20px;
overflow: hidden;
box-shadow:
0 0 40px rgba(147,51,234,0.15),
0 0 80px rgba(147,51,234,0.07),
inset 0 0 60px rgba(88,28,135,0.08);
}

/* 상단 장식선 */
.card-top-line {
height: 2px;
background: linear-gradient(90deg, transparent, var(–vivid-purple), var(–accent-pink), var(–vivid-purple), transparent);
animation: glow-line 3s ease-in-out infinite;
}
@keyframes glow-line {
0%,100% { opacity: 0.6; }
50% { opacity: 1; box-shadow: 0 0 10px var(–vivid-purple); }
}

/* 프로필 이미지 섹션 */
.profile-hero {
position: relative;
padding: 32px 24px 0;
display: flex;
flex-direction: column;
align-items: center;
}

.avatar-container {
position: relative;
width: 130px;
height: 130px;
margin-bottom: 0;
}

.avatar-ring {
position: absolute;
inset: -4px;
border-radius: 50%;
background: conic-gradient(var(–vivid-purple), var(–accent-pink), var(–vivid-purple), #7c3aed, var(–accent-pink), var(–vivid-purple));
animation: spin-ring 6s linear infinite;
z-index: 0;
}
@keyframes spin-ring {
from { transform: rotate(0deg); }
to { transform: rotate(360deg); }
}

.avatar-ring-inner {
position: absolute;
inset: 2px;
border-radius: 50%;
background: var(–near-black);
z-index: 1;
}

.avatar-img {
position: relative;
z-index: 2;
width: 130px;
height: 130px;
border-radius: 50%;
object-fit: cover;
display: block;
margin: 0 auto;
filter: saturate(0.9) contrast(1.05);
}

.deco-dots {
position: absolute;
top: -8px;
left: 50%;
transform: translateX(-50%);
display: flex;
gap: 6px;
}
.deco-dot {
width: 5px;
height: 5px;
border-radius: 50%;
background: var(–accent-pink);
box-shadow: 0 0 6px var(–accent-pink);
animation: pulse-dot 2s ease-in-out infinite;
}
.deco-dot:nth-child(2) { animation-delay: 0.3s; background: var(–glow-purple); box-shadow: 0 0 6px var(–glow-purple); }
.deco-dot:nth-child(3) { animation-delay: 0.6s; }
@keyframes pulse-dot {
0%,100% { opacity: 0.4; transform: scale(1); }
50% { opacity: 1; transform: scale(1.4); }
}

/* 이름 / ID */
.name-section {
text-align: center;
margin-top: 18px;
padding: 0 16px;
}

.nickname {
font-family: ‘Cinzel Decorative’, serif;
font-size: 26px;
font-weight: 700;
background: linear-gradient(135deg, var(–glow-purple), var(–accent-pink), #e879f9);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
letter-spacing: 3px;
text-shadow: none;
filter: drop-shadow(0 0 10px rgba(192,132,252,0.4));
}

.handle {
font-size: 13px;
color: var(–glow-purple);
margin-top: 4px;
letter-spacing: 1px;
opacity: 0.8;
}

/* 구분선 */
.divider {
width: 80%;
height: 1px;
background: linear-gradient(90deg, transparent, rgba(147,51,234,0.5), rgba(244,114,182,0.5), rgba(147,51,234,0.5), transparent);
margin: 16px auto;
}

/* 정보 그리드 */
.info-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 10px;
padding: 0 20px 16px;
}

.info-card {
background: rgba(88,28,135,0.12);
border: 1px solid rgba(147,51,234,0.2);
border-radius: 12px;
padding: 10px 12px;
position: relative;
overflow: hidden;
transition: border-color 0.3s;
}
.info-card:hover {
border-color: rgba(147,51,234,0.5);
background: rgba(88,28,135,0.2);
}
.info-card::before {
content: ‘’;
position: absolute;
top: 0; left: 0; right: 0;
height: 1px;
background: linear-gradient(90deg, transparent, rgba(192,132,252,0.4), transparent);
}

.info-label {
font-size: 10px;
color: var(–mid-purple);
letter-spacing: 1.5px;
text-transform: uppercase;
margin-bottom: 3px;
font-weight: 500;
}

.info-value {
font-size: 13px;
color: var(–pale-lavender);
font-weight: 500;
line-height: 1.4;
}

.info-value span.small {
font-size: 9px;
color: var(–glow-purple);
opacity: 0.7;
}

.info-value .highlight {
color: var(–accent-pink);
}

.info-card.full-width {
grid-column: 1 / -1;
}

/* FUB / 관계 태그 */
.tag-row {
display: flex;
gap: 8px;
flex-wrap: wrap;
padding: 0 20px 12px;
}

.tag {
font-size: 11px;
padding: 4px 12px;
border-radius: 20px;
border: 1px solid;
letter-spacing: 0.5px;
font-weight: 500;
}
.tag-purple {
border-color: rgba(147,51,234,0.5);
color: var(–glow-purple);
background: rgba(88,28,135,0.15);
}
.tag-pink {
border-color: rgba(244,114,182,0.4);
color: var(–accent-pink);
background: rgba(157,23,77,0.1);
}

/* 트윗 성향 */
.tweet-section {
padding: 0 20px 16px;
}
.section-title {
font-size: 10px;
letter-spacing: 2px;
text-transform: uppercase;
color: var(–mid-purple);
margin-bottom: 8px;
font-weight: 600;
}

.tweet-tags {
display: flex;
flex-wrap: wrap;
gap: 6px;
}

.tweet-tag {
font-size: 11px;
color: var(–gray-text);
background: rgba(30,10,50,0.8);
border: 1px solid rgba(107,33,168,0.3);
border-radius: 6px;
padding: 4px 10px;
transition: all 0.2s;
}
.tweet-tag:hover {
border-color: var(–vivid-purple);
color: var(–glow-purple);
}

/* 워드 클라우드 */
.wordcloud-section {
padding: 0 20px 20px;
}
.wordcloud-box {
background: rgba(13,6,24,0.8);
border: 1px solid rgba(107,33,168,0.25);
border-radius: 14px;
padding: 18px 14px;
position: relative;
min-height: 160px;
display: flex;
align-items: center;
justify-content: center;
overflow: hidden;
}

.wordcloud-box::before {
content: ‘’;
position: absolute;
inset: 0;
background: radial-gradient(ellipse at center, rgba(88,28,135,0.08) 0%, transparent 70%);
pointer-events: none;
}

.cloud-inner {
position: relative;
width: 100%;
height: 160px;
}

.cloud-word {
position: absolute;
font-family: ‘Noto Sans KR’, sans-serif;
font-weight: 700;
white-space: nowrap;
cursor: default;
transition: opacity 0.2s;
}
.cloud-word:hover { opacity: 0.8; }

/* 하단 장식 */
.card-bottom {
padding: 10px 20px 16px;
display: flex;
justify-content: center;
align-items: center;
gap: 8px;
}

.bottom-line {
flex: 1;
height: 1px;
background: linear-gradient(90deg, transparent, rgba(107,33,168,0.3));
}
.bottom-line.rev {
background: linear-gradient(90deg, rgba(107,33,168,0.3), transparent);
}

.bottom-deco {
font-size: 14px;
color: rgba(147,51,234,0.4);
}

/* 애니메이션 */
@keyframes fadeInUp {
from { opacity: 0; transform: translateY(20px); }
to { opacity: 1; transform: translateY(0); }
}

.card { animation: fadeInUp 0.6s ease-out; }
</style>

</head>
